<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="512" height="512" fill="#0B1F3A"/>
  
  <!-- TMR Logo -->
  <g transform="translate(256, 256)">
    <!-- Gradient arc background -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#gradient)" stroke-width="8" opacity="0.3"/>
    
    <!-- Circuit pattern -->
    <g opacity="0.2">
      <circle cx="-60" cy="-60" r="4" fill="#22C55E"/>
      <circle cx="60" cy="-60" r="4" fill="#22C55E"/>
      <circle cx="60" cy="60" r="4" fill="#22C55E"/>
      <circle cx="-60" cy="60" r="4" fill="#22C55E"/>
      <line x1="-60" y1="-60" x2="60" y2="-60" stroke="#22C55E" stroke-width="2"/>
      <line x1="60" y1="-60" x2="60" y2="60" stroke="#22C55E" stroke-width="2"/>
      <line x1="60" y1="60" x2="-60" y2="60" stroke="#22C55E" stroke-width="2"/>
      <line x1="-60" y1="60" x2="-60" y2="-60" stroke="#22C55E" stroke-width="2"/>
    </g>
    
    <!-- TMR Text -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="white">TMR</text>
  </g>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
